---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  config-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@da2bf7ed16cc9778fedff463249466ca88069df5 # main
    name: Config Module
    with:
      working-directory: modules/config

  tagging-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@da2bf7ed16cc9778fedff463249466ca88069df5 # main
    name: Tagging Module
    with:
      working-directory: modules/tagging

  scheduler-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@da2bf7ed16cc9778fedff463249466ca88069df5 # main
    name: Scheduler Module
    with:
      working-directory: modules/scheduler

  spoke-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@da2bf7ed16cc9778fedff463249466ca88069df5 # main
    name: Spoke Module
    with:
      working-directory: modules/spoke

  macro-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@da2bf7ed16cc9778fedff463249466ca88069df5 # main
    name: Macro Module
    with:
      working-directory: modules/macro
